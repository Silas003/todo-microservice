AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table — single-table design with Streams

Parameters:
  Environment:
    Type: String

Resources:
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Tasks-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

Outputs:
  TableName:
    Value: !Ref TasksTable
  TableArn:
    Value: !GetAtt TasksTable.Arn
  StreamArn:
    Value: !GetAtt TasksTable.StreamArn
